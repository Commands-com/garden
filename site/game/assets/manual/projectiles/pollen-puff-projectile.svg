<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 32" role="img" aria-labelledby="title desc">
  <title id="title">Pollen Puff projectile</title>
  <desc id="desc">A glowing pollen bolt projectile — warm amber orb with a trailing pollen wake, shaped to read as splash rather than a piercing lance.</desc>
  <defs>
    <radialGradient id="pp-core" cx="70%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#fff5c2"/>
      <stop offset="55%" stop-color="#f4cc55"/>
      <stop offset="100%" stop-color="#a6761c"/>
    </radialGradient>
    <linearGradient id="pp-trail" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fff5c2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f4cc55" stop-opacity=".85"/>
    </linearGradient>
  </defs>

  <path d="M8 16 L64 10 L64 22 Z" fill="url(#pp-trail)"/>

  <g fill="#fff7c4" opacity=".9">
    <circle cx="18" cy="12" r="1.5"/>
    <circle cx="28" cy="20" r="1.5"/>
    <circle cx="36" cy="10" r="1.5"/>
    <circle cx="44" cy="22" r="1.5"/>
    <circle cx="54" cy="12" r="1.5"/>
  </g>

  <circle cx="74" cy="16" r="12" fill="url(#pp-core)" stroke="#fff5c2" stroke-width="2"/>
  <circle cx="70" cy="13" r="3.5" fill="#fff9d9" opacity=".95"/>
</svg>
