<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Husk Walker plate decal</title>
  <desc id="desc">Plate-only decal aligned over the Husk Walker body. The runtime sets scaleY to 0.85 and offsets y by -4 px during the vulnerability windup so the plate visibly retracts and the soft body is exposed.</desc>
  <defs>
    <linearGradient id="plateFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#bf8c66"/>
      <stop offset="55%" stop-color="#7a4d30"/>
      <stop offset="100%" stop-color="#3a1f12"/>
    </linearGradient>
  </defs>
  <path d="M40 84 C38 64 50 50 64 50 C78 50 90 64 88 84 C86 92 78 96 64 96 C50 96 42 92 40 84 Z"
        fill="url(#plateFill)" stroke="#1d0a04" stroke-width="2.5"/>
  <g stroke="#3c1f10" stroke-width="1.4" fill="none" opacity="0.75">
    <path d="M50 62 L52 90"/>
    <path d="M64 58 L64 94"/>
    <path d="M78 62 L76 90"/>
  </g>
  <path d="M48 56 C56 52 72 52 80 56" fill="none" stroke="#e7c79a" stroke-width="1.4" opacity="0.55"/>
</svg>
