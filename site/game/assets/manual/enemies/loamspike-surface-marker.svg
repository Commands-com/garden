<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Loamspike surface marker</title>
  <desc id="desc">A subtle ground-crack decal marking the column where the Loamspike will surface.</desc>
  <defs>
    <radialGradient id="marker" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a5a2a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1c110a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="32" cy="34" rx="22" ry="8" fill="url(#marker)"/>
  <g stroke="#c4925a" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M16 34 L26 32 L32 36 L40 30 L48 34"/>
    <path d="M20 28 L28 34 L38 30"/>
  </g>
  <g stroke="#f4d9a8" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M24 36 L32 34 L40 36"/>
  </g>
</svg>
