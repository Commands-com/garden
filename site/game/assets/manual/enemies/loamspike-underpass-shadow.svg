<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" role="img" aria-labelledby="title desc">
  <title id="title">Loamspike underpass shadow</title>
  <desc id="desc">A semi-transparent tracking shadow rendered while a Loamspike is underpassed.</desc>
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="32" cy="16" rx="28" ry="8" fill="url(#shadow)"/>
  <ellipse cx="32" cy="16" rx="14" ry="4" fill="#000000" opacity="0.32"/>
</svg>
