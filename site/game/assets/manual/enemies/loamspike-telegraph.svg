<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Loamspike dive telegraph</title>
  <desc id="desc">A jagged soil-crack decal marking the column where the Loamspike is about to dive.</desc>
  <defs>
    <radialGradient id="soil" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4a2f1a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1c110a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="32" cy="34" rx="26" ry="10" fill="url(#soil)"/>
  <g stroke="#c4925a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M10 34 L22 30 L26 36 L36 28 L40 34 L52 30"/>
    <path d="M16 40 L24 36 L30 42 L44 34"/>
    <path d="M22 24 L28 30 L34 24 L42 30"/>
  </g>
  <g fill="#3a210f" opacity="0.9">
    <circle cx="22" cy="34" r="1.2"/>
    <circle cx="32" cy="30" r="1.2"/>
    <circle cx="42" cy="36" r="1.2"/>
    <circle cx="50" cy="32" r="1.2"/>
  </g>
</svg>
