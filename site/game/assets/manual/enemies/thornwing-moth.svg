<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Thornwing Moth enemy</title>
  <desc id="desc">A static leftward-facing thornwing moth with thorn-tipped wings, used for the April 18 first flying enemy.</desc>
  <defs>
    <linearGradient id="wingUpper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#6b3ea8"/>
      <stop offset="100%" stop-color="#2b1450"/>
    </linearGradient>
    <linearGradient id="wingLower" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#9a5ad0"/>
      <stop offset="100%" stop-color="#4a2180"/>
    </linearGradient>
    <radialGradient id="eyespot" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe090"/>
      <stop offset="100%" stop-color="#c06820"/>
    </radialGradient>
  </defs>

  <!-- No ground shadow here; the runtime draws a drop shadow separately so altitude reads clearly. -->

  <!-- Left (forward) wing pair — larger, thorn-tipped -->
  <path d="M60 62 C36 36 12 42 6 56 C2 68 14 80 34 78 C44 76 54 70 60 62 Z"
        fill="url(#wingUpper)" stroke="#180630" stroke-width="3" stroke-linejoin="round"/>
  <path d="M60 68 C40 84 18 90 10 80 C6 72 18 64 34 66 C46 66 54 68 60 68 Z"
        fill="url(#wingLower)" stroke="#180630" stroke-width="3" stroke-linejoin="round"/>
  <!-- Thorn tips on leading wing -->
  <path d="M6 56 L-2 52 L8 50 Z" fill="#f5e4a8" stroke="#2a1706" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M10 80 L2 84 L12 84 Z" fill="#f5e4a8" stroke="#2a1706" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right (rear) wing pair — smaller, suggesting flight direction -->
  <path d="M68 62 C86 44 110 52 114 64 C116 74 104 82 88 80 C78 78 72 70 68 62 Z"
        fill="url(#wingUpper)" stroke="#180630" stroke-width="3" stroke-linejoin="round"/>
  <path d="M68 68 C84 82 104 86 110 78 C112 72 102 66 88 68 C78 68 72 68 68 68 Z"
        fill="url(#wingLower)" stroke="#180630" stroke-width="3" stroke-linejoin="round"/>

  <!-- Eyespots on upper wings -->
  <circle cx="28" cy="58" r="6" fill="url(#eyespot)"/>
  <circle cx="28" cy="58" r="2.2" fill="#1b0510"/>
  <circle cx="92" cy="60" r="5" fill="url(#eyespot)" opacity=".9"/>
  <circle cx="92" cy="60" r="1.8" fill="#1b0510"/>

  <!-- Body: fuzzy thorn-moth thorax and abdomen -->
  <path d="M54 54 C50 62 50 72 56 80 C62 84 70 84 76 80 C82 72 82 62 78 54 C72 48 60 48 54 54 Z"
        fill="#3a1f58" stroke="#12050b" stroke-width="3" stroke-linejoin="round"/>
  <!-- Segment stripes -->
  <path d="M54 66 C60 68 72 68 78 66" fill="none" stroke="#b58cf0" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
  <path d="M55 74 C61 76 71 76 77 74" fill="none" stroke="#b58cf0" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>

  <!-- Head + compound eyes (facing left) -->
  <circle cx="52" cy="56" r="6" fill="#2b1450" stroke="#12050b" stroke-width="2"/>
  <circle cx="50" cy="54" r="2.2" fill="#ffd27a"/>
  <!-- Antennae curling forward (left) -->
  <path d="M52 50 C44 44 38 40 32 40" fill="none" stroke="#b58cf0" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M54 48 C48 40 42 34 36 32" fill="none" stroke="#b58cf0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tiny thorn accents on the body -->
  <path d="M66 50 L68 44 L70 50 Z" fill="#c99237" stroke="#fff1c7" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M64 82 L66 88 L68 82 Z" fill="#c99237" stroke="#fff1c7" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
