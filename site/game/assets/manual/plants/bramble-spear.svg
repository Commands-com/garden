  <path d="M64 48 L39 24 L50 66 Z" fill="url(#thorn)" stroke="#fff1c7" stroke-width="3" stroke-linejoin="round"/>
  <path d="M62 54 L28 49 L54 78 Z" fill="url(#thorn)" stroke="#fff1c7" stroke-width="3" stroke-linejoin="round"/>
  <path d="M66 54 L100 49 L74 78 Z" fill="url(#thorn)" stroke="#fff1c7" stroke-width="3" stroke-linejoin="round"/>

  <path d="M64 88 C46 82 38 62 42 48 C46 34 58 28 64 28 C70 28 82 34 86 48 C90 62 82 82 64 88 Z"
