<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Bramble Spear defender</title>
  <desc id="desc">A rooted bramble defender with spear-like thorn petals and a bright amber core.</desc>
  <defs>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4f7a45"/>
      <stop offset="100%" stop-color="#1f4627"/>
    </linearGradient>
    <linearGradient id="thorn" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5df9d"/>
      <stop offset="100%" stop-color="#bb8640"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fff5c2"/>
      <stop offset="60%" stop-color="#d7b66b"/>
      <stop offset="100%" stop-color="#8d6432"/>
    </radialGradient>
  </defs>

  <ellipse cx="64" cy="101" rx="34" ry="14" fill="#102218" opacity=".36"/>
  <ellipse cx="64" cy="97" rx="30" ry="11" fill="#224631" opacity=".8"/>

