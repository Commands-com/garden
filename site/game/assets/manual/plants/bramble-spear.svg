  <circle cx="64" cy="58" r="15" fill="url(#core)" stroke="#f8efc6" stroke-width="3"/>
  <circle cx="64" cy="58" r="6" fill="#fff7d3" opacity=".95"/>

  <path d="M48 87 C42 93 40 104 41 113" fill="none" stroke="#2b5933" stroke-width="6" stroke-linecap="round"/>
  <path d="M80 87 C86 93 88 104 87 113" fill="none" stroke="#2b5933" stroke-width="6" stroke-linecap="round"/>
  <path d="M64 89 C64 97 64 105 64 114" fill="none" stroke="#214428" stroke-width="7" stroke-linecap="round"/>
