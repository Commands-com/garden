<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Pollen Puff defender</title>
  <desc id="desc">A rooted anti-air splash plant — a warm yellow puffball bloom with a soft pollen halo and tuft-like petal fringe.</desc>
  <defs>
    <linearGradient id="pp-leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6ba25a"/>
      <stop offset="100%" stop-color="#2f5a34"/>
    </linearGradient>
    <radialGradient id="pp-puff" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fff4b0"/>
      <stop offset="55%" stop-color="#f4cc55"/>
      <stop offset="100%" stop-color="#a6761c"/>
    </radialGradient>
    <radialGradient id="pp-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c2" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fff5c2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="64" cy="101" rx="34" ry="14" fill="#102218" opacity=".36"/>
  <ellipse cx="64" cy="97" rx="30" ry="11" fill="#224631" opacity=".8"/>

