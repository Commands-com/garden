    <circle cx="65" cy="16" r="2.4"/>
    <circle cx="77" cy="22" r="2.4"/>
    <circle cx="82" cy="34" r="2.4"/>
    <circle cx="75" cy="47" r="2.4"/>
    <circle cx="61" cy="52" r="2.4"/>
    <circle cx="49" cy="46" r="2.4"/>
    <circle cx="45" cy="33" r="2.4"/>
  </g>
  <g fill="#fffdf6" opacity=".92">
    <circle cx="57" cy="29" r="3.3"/>
