    <path d="M90 90 C102 84 106 72 102 62 C86 68 79 78 76 90 Z"/>
    <path d="M50 108 C42 104 38 98 38 92 C47 94 51 99 54 106 Z"/>
    <path d="M78 108 C86 104 90 98 90 92 C81 94 77 99 74 106 Z"/>
  </g>

  <path d="M64 96 C61 78 58 63 52 47" fill="none" stroke="#28503a" stroke-width="8" stroke-linecap="round"/>
  <path d="M64 96 C67 78 70 63 76 47" fill="none" stroke="#28503a" stroke-width="8" stroke-linecap="round"/>
  <path d="M52 49 C54 38 60 32 64 32 C68 32 74 38 76 49" fill="none" stroke="#28503a" stroke-width="7" stroke-linecap="round"/>

  <path d="M41 56 C45 38 55 28 64 28 C73 28 83 38 87 56 C80 60 72 62 64 62 C56 62 48 60 41 56 Z" fill="url(#cb-cup)" stroke="#143022" stroke-width="3"/>

  <circle cx="64" cy="34" r="19" fill="url(#cb-burr)" stroke="#6f5732" stroke-width="3"/>
  <g fill="#6f5732">
