<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Cottonburr Mortar plant</title>
  <desc id="desc">A rooted mortar-like plant with a cupped stem and a pale cottonburr payload prepared for a high-arc launch.</desc>
  <defs>
    <linearGradient id="cb-leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6ea56c"/>
      <stop offset="100%" stop-color="#284f34"/>
    </linearGradient>
    <linearGradient id="cb-cup" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4b8459"/>
      <stop offset="100%" stop-color="#204230"/>
    </linearGradient>
    <radialGradient id="cb-burr" cx="46%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#fff9e9"/>
      <stop offset="58%" stop-color="#d9caa6"/>
      <stop offset="100%" stop-color="#8d7045"/>
    </radialGradient>
    <radialGradient id="cb-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#102218" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#102218" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="64" cy="104" rx="34" ry="14" fill="url(#cb-shadow)"/>
  <ellipse cx="64" cy="99" rx="30" ry="11" fill="#224631" opacity=".82"/>

  <g fill="url(#cb-leaf)" stroke="#143022" stroke-width="2.5" stroke-linejoin="round">
